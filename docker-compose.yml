services:
  postgres:
    image: postgres:16-alpine
    container_name: gpm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: github_project_management
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d github_project_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
